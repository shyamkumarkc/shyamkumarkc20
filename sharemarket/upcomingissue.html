<!DOCTYPE html>
<html lang="en">
<head>
<title>Upcoming Issue</title>
<link rel="shortcut icon" type="image/jpg" href="/brp.jpg">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script>
$(function(){
$('#header').load('/assets/header.html')
$('#ipowidget').load('/assets/ipowidget.html')
$('#footer').load('/assets/footer.html')
})
</script>

<style>
body{font-family:Arial;margin:20px}
h1{text-align:center}

.tabs{
margin-bottom:20px;
display:flex;
flex-wrap:wrap
}

.tab-button{
padding:8px 16px;
border:1px solid #ccc;
background:#f0f0f0;
cursor:pointer;
margin-right:4px
}

.tab-button.active{
background:#333;
color:#fff
}

table{
width:100%;
border-collapse:collapse
}

th,td{
border:1px solid #ddd;
padding:8px;
text-align:left
}

th{background:#f4f4f4}

.status-open{background:#4CAF50;color:#fff;padding:4px 8px;border-radius:4px}
.status-closed{background:#f44336;color:#fff;padding:4px 8px;border-radius:4px}
.status-coming{background:#2196F3;color:#fff;padding:4px 8px;border-radius:4px}

.page-btn{
padding:6px 12px;
margin:3px;
border:none;
background:#333;
color:white;
cursor:pointer;
border-radius:4px
}

.page-btn.active{background:#4CAF50}

/* MOBILE VIEW */
@media(max-width:768px){

table,thead,tbody,th,td,tr{display:block}

td{
border:none;
border-bottom:1px solid #ddd;
position:relative;
padding-left:50%
}

td:before{
position:absolute;
left:10px;
width:45%;
font-weight:bold
}

td:nth-of-type(1):before{content:"S.N."}
td:nth-of-type(2):before{content:"Company"}
td:nth-of-type(3):before{content:"Units"}
td:nth-of-type(4):before{content:"Price"}
td:nth-of-type(5):before{content:"Opening Date"}
td:nth-of-type(6):before{content:"Closing Date"}
td:nth-of-type(7):before{content:"Last Closing Date"}
td:nth-of-type(8):before{content:"Issue Manager"}
td:nth-of-type(9):before{content:"Status"}

}
</style>
</head>

<body>

<div id="header"></div>

<h1>Upcoming Issue</h1>

<div id="ipowidget"></div>

<div class="tabs">
<button class="tab-button active" data-type="ipo">IPO</button>
<button class="tab-button" data-type="rightShare">Right Share</button>
<button class="tab-button" data-type="fpo">FPO</button>
<button class="tab-button" data-type="mutual">Mutual Fund</button>
<button class="tab-button" data-type="migrant">Foreign Employment</button>
<button class="tab-button" data-type="debenture">Debentures</button>
<button class="tab-button" data-type="pshare">Preference Share</button>
<button class="tab-button" data-type="future">Pipeline IPO</button>
</div>

<table id="dataTable">
<thead>
<tr>
<th>S.N.</th>
<th>Company</th>
<th>Units</th>
<th>Price</th>
<th>Opening Date</th>
<th>Closing Date</th>
<th>Last Closing Date</th>
<th>Issue Manager</th>
<th>Status</th>
</tr>
</thead>
<tbody>
<tr><td colspan="12">Loading...</td></tr>
</tbody>
</table>

<div id="pagination" style="text-align:center;margin-top:15px;"></div>

<script>
let allData={}
let currentPage=1
const rowsPerPage=10
let currentItems=[]

function statusClass(status){
const s=(status||'').toLowerCase()
if(s==='open')return 'status-open'
if(s==='closed')return 'status-closed'
if(s.includes('coming'))return 'status-coming'
return ''
}

function statusPriority(status){
const s=(status||'').toLowerCase()
if(s==='open')return 1
if(s.includes('coming'))return 2
if(s==='closed')return 3
return 4
}

function computeStatus(item){

if(!item.openingDate||!item.closingDate)return'Coming Soon'

const now=new Date()
const opening=new Date(item.openingDate)
const closing=new Date(item.closingDate)
const hour=now.getHours()

const isOpenDay=now.toDateString()===opening.toDateString()
const isCloseDay=now.toDateString()===closing.toDateString()

if(isOpenDay&&hour<10)return'Coming Soon'
if(now>=opening&&now<=closing)return'Open'
if(isCloseDay&&hour<17)return'Open'
if(isCloseDay&&hour>=17)return'Closed'
if(now>closing)return'Closed'
if(now<opening)return'Coming Soon'

return'Coming Soon'
}

function renderTable(items){

const tbody=document.querySelector('#dataTable tbody')
tbody.innerHTML=""

if(!items||items.length===0){
tbody.innerHTML=`<tr><td colspan="12">No data available.</td></tr>`
document.getElementById("pagination").innerHTML=""
return
}

items.forEach(i=>i.status=computeStatus(i))
items.sort((a,b)=>statusPriority(a.status)-statusPriority(b.status))

currentItems=items

const start=(currentPage-1)*rowsPerPage
const paginated=items.slice(start,start+rowsPerPage)

paginated.forEach((item,index)=>{
const tr=document.createElement('tr')
tr.innerHTML=`
<td>${start+index+1}</td>
<td>${item.company||''}</td>
<td>${item.units||''}</td>
<td>${item.price||''}</td>
<td>${item.openingDate||''}</td>
<td>${item.closingDate||''}</td>
<td>${item.lastClosingDate||''}</td>
<td>${item.issueManager||''}</td>
<td><span class="${statusClass(item.status)}">${item.status}</span></td>
`
tbody.appendChild(tr)
})

renderPagination(items.length)
}

function renderPagination(total){

const pages=Math.ceil(total/rowsPerPage)
const box=document.getElementById("pagination")
box.innerHTML=""

if(pages<=1)return

if(currentPage>1)
box.innerHTML+=`<button class="page-btn" onclick="changePage(${currentPage-1})">Prev</button>`

for(let i=1;i<=pages;i++)
box.innerHTML+=`<button class="page-btn ${i===currentPage?'active':''}" onclick="changePage(${i})">${i}</button>`

if(currentPage<pages)
box.innerHTML+=`<button class="page-btn" onclick="changePage(${currentPage+1})">Next</button>`
}

function changePage(page){
currentPage=page
renderTable(currentItems)
window.scrollTo({top:0,behavior:"smooth"})
}

function loadAndShow(type){

const tbody=document.querySelector('#dataTable tbody')
tbody.innerHTML=`<tr><td colspan="12">Loading...</td></tr>`

if(Object.keys(allData).length>0){
renderTable(allData[type]||[])
return
}

fetch('https://shyamkumarkc20.com.np/js/ipo.json')
.then(r=>r.json())
.then(json=>{
allData=json
renderTable(allData[type]||[])
})
.catch(err=>{
tbody.innerHTML=`<tr><td colspan="12">Error loading data</td></tr>`
})
}

document.querySelectorAll('.tab-button').forEach(btn=>{
btn.addEventListener('click',()=>{
document.querySelectorAll('.tab-button').forEach(b=>b.classList.remove('active'))
btn.classList.add('active')
currentPage=1
loadAndShow(btn.dataset.type)
})
})

loadAndShow('ipo')
</script>

<div id="footer"></div>

</body>
</html>
