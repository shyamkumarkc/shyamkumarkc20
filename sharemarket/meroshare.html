<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Share Portfolio Dashboard</title>

<!-- Google Fonts for NEPSE-style -->
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

<style>
  body {
    font-family: 'Roboto', sans-serif;
    margin: 0;
    background: #f4f7fa;
    color: #333;
  }

  .container {
    max-width: 1200px;
    margin: 20px auto;
    padding: 0 20px;
  }

  h1 {
    text-align: center;
    margin-bottom: 20px;
    color: #0b3d91;
  }

  /* Summary Cards */
  .cards {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    justify-content: center;
    margin-bottom: 40px;
  }

  .card {
    flex: 1 1 220px;
    background: linear-gradient(135deg, #007bff, #00c6ff);
    color: #fff;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    text-align: center;
  }

  .card h2 {
    margin: 0;
    font-size: 24px;
  }

  .card p {
    margin: 5px 0 0 0;
    font-size: 14px;
  }

  /* Table */
  table {
    width: 100%;
    border-collapse: collapse;
    background: #fff;
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 40px;
  }

  th, td {
    padding: 12px 10px;
    text-align: center;
  }

  th {
    background: #007bff;
    color: #fff;
    font-weight: 500;
  }

  tr:nth-child(even) {
    background: #f7f9fc;
  }

  tr:hover {
    background: #e0f0ff;
  }

  /* Chart */
  #chartContainer {
    margin-bottom: 40px;
  }

  #legend {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 15px;
    margin-top: 15px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    font-size: 14px;
  }

  .legend-color {
    width: 20px;
    height: 20px;
    margin-right: 6px;
    border-radius: 3px;
  }

  @media (max-width: 768px) {
    .cards { flex-direction: column; align-items: center; }
    table, th, td { font-size: 12px; }
  }
</style>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="container">
  <h1>My Share Portfolio Dashboard</h1>

  <!-- Portfolio Summary Cards -->
  <div class="cards">
    <div class="card">
      <h2 id="totalCompanies">0</h2>
      <p>Total Companies</p>
    </div>
    <div class="card">
      <h2 id="totalUnits">0</h2>
      <p>Total Shares</p>
    </div>
    <div class="card">
      <h2 id="totalValue">0</h2>
      <p>Total Portfolio Value (NPR)</p>
    </div>
  </div>

  <!-- Portfolio Table -->
  <table id="portfolio-table">
    <thead>
      <tr>
        <th>Company</th>
        <th>Shares</th>
        <th>Price (NPR)</th>
        <th>Total Value (NPR)</th>
        <th>Sector</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <!-- Sector Bar Chart -->
  <div id="chartContainer">
    <canvas id="portfolioChart"></canvas>
    <div id="legend"></div>
  </div>
</div>

<script>
const sectorColors = {
  "Commercial Banks": "rgba(0,123,255,0.7)",
  "Hydro Power": "rgba(40,167,69,0.7)",
  "Mutual Fund": "rgba(102,51,153,0.7)",
  "Life Insurance": "rgba(255,159,64,0.7)",
  "Non Life Insurance": "rgba(220,53,69,0.7)",
  "Microfinance": "rgba(0,128,128,0.7)",
  "Manufacturing And Processing": "rgba(165,42,42,0.7)",
  "Development Banks": "rgba(108,117,125,0.7)",
  "Others": "rgba(108,117,125,0.7)"
};

async function loadPortfolio() {
  try {
    const res = await fetch('https://shyamkumarkc20.com.np/js/meroshare.json');
    const data = await res.json();

    const tbody = document.querySelector('#portfolio-table tbody');
    tbody.innerHTML = '';

    let labels = [], values = [], colors = [];
    let totalCompanies = 0, totalUnits = 0, totalPortfolioValue = 0;
    let usedSectors = new Set();

    data.forEach(item => {
      const units = parseFloat(item.Units) || 0;
      const price = parseFloat(item.WACC) || 0;
      let total = parseFloat(item.Value);
      if (isNaN(total)) total = units * price || 0;

      // Add table row for all shares
      const row = document.createElement('tr');
      row.innerHTML = `
        <td>${item.Name}</td>
        <td>${units}</td>
        <td>${price.toLocaleString()}</td>
        <td>${total.toLocaleString()}</td>
        <td>${item.Sector}</td>
      `;
      tbody.appendChild(row);

      // Add chart data only if total > 0
      if (total > 0) {
        labels.push(item.Name);
        values.push(total);
        const sectorColor = sectorColors[item.Sector] || 'rgba(200,200,200,0.7)';
        colors.push(sectorColor);
        usedSectors.add(item.Sector);

        totalCompanies++;
        totalUnits += units;
        totalPortfolioValue += total;
      }
    });

    // Update summary cards
    document.getElementById('totalCompanies').innerText = totalCompanies;
    document.getElementById('totalUnits').innerText = totalUnits.toLocaleString();
    document.getElementById('totalValue').innerText = totalPortfolioValue.toLocaleString();

    drawChart(labels, values, colors);
    drawLegend(usedSectors);

  } catch (err) {
    console.error('Error loading portfolio:', err);
  }
}

function drawChart(labels, values, colors) {
  const ctx = document.getElementById('portfolioChart').getContext('2d');
  new Chart(ctx, {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [{
        label: 'Total Value (NPR)',
        data: values,
        backgroundColor: colors,
        borderColor: colors.map(c => c.replace('0.7','1')),
        borderWidth: 1
      }]
    },
    options: {
      responsive: true,
      plugins: { legend: { display: false }, tooltip: { mode: 'index', intersect: false } },
      scales: { x: { ticks: { autoSkip: false } }, y: { beginAtZero: true } }
    }
  });
}

function drawLegend(sectors) {
  const legendContainer = document.getElementById('legend');
  legendContainer.innerHTML = '';
  sectors.forEach(sector => {
    const color = sectorColors[sector] || 'rgba(200,200,200,0.7)';
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.innerHTML = `<div class="legend-color" style="background:${color}"></div>${sector}`;
    legendContainer.appendChild(item);
  });
}

loadPortfolio();
</script>

</body>
</html>
